<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data:; img-src 'self' data:; font-src 'self' data:; script-src 'self' 'unsafe-eval'">
  <title>پروازلاگ</title>
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="lib/jalalidatepicker.min.css">
  <link rel="stylesheet" href="select2/dist/css/select2.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container-fluid p-3">
    <!-- Header with logo -->
    <div class="text-center mb-4">
      <img src="assets/logo.png" alt="Parvazlog" style="height: 60px;">
      <h1 class="d-inline-block align-middle ms-3">پروازلاگ</h1>
    </div>

  <!-- Top action bar -->
  <div class="mb-3 d-flex flex-wrap align-items-center gap-2">
    <button id="newTicketBtn" class="btn btn-primary btn-lg d-flex align-items-center gap-1">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
        <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
      </svg>
      ثبت بلیط جدید
    </button>
    <button id="importExcelBtn" class="btn btn-success d-flex align-items-center gap-1">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
        <path d="M5.884 6.68a.5.5 0 1 0-.768.64L7.349 10l-2.233 2.68a.5.5 0 0 0 .768.64L8 10.781l2.116 2.539a.5.5 0 0 0 .768-.64L8.651 10l2.233-2.68a.5.5 0 0 0-.768-.64L8 9.219l-2.116-2.54z"/>
        <path d="M14 14V4.5L9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2zM9.5 3A1.5 1.5 0 0 0 11 4.5h2V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h5.5v2z"/>
      </svg>
      ورود از Excel
    </button>
    <button id="exportExcelBtn" class="btn btn-warning text-dark d-flex align-items-center gap-1">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
        <path d="M14 14V4.5L9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2zM9.5 3A1.5 1.5 0 0 0 11 4.5h2V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h5.5v2z"/>
        <path d="M5 10.5a.5.5 0 0 1 .5-.5h1.793L5.146 7.854a.5.5 0 1 1 .708-.708L8 9.293l2.146-2.147a.5.5 0 0 1 .708.708L8.707 10h1.793a.5.5 0 0 1 0 1h-1.793l2.147 2.146a.5.5 0 0 1-.708.708L8 11.707l-2.146 2.147a.5.5 0 0 1-.708-.708L7.293 11H5.5a.5.5 0 0 1-.5-.5z"/>
      </svg>
      خروجی Excel
    </button>
    <button id="deleteSelectedBtn" class="btn btn-danger d-flex align-items-center gap-1" disabled>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
        <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
        <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
      </svg>
      حذف انتخاب‌ها
    </button>
    <div class="ms-auto d-flex align-items-center gap-2">
      <!-- Year filter -->
      <div class="d-flex align-items-center gap-2">
        <label class="form-label mb-0">سال:</label>
        <select id="yearFilterSelect" class="form-select form-select-sm" style="width: auto;">
          <option value="">همه</option>
        </select>
      </div>
      <button id="setExportPathBtn" class="btn btn-outline-info d-flex align-items-center gap-1" title="Set export folder">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M9.828 3h3.982a2 2 0 0 1 1.992 2.181l-.637 7A2 2 0 0 1 13.174 14H2.825a2 2 0 0 1-1.991-1.819l-.637-7a1.99 1.99 0 0 1 .342-1.31L.5 3a2 2 0 0 1 2-2h3.672a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 9.828 3zm-8.322.12C1.72 3.042 1.95 3 2.19 3h5.836l-.707-.707A1 1 0 0 0 6.172 2H2.5a1 1 0 0 0-1 .998l.006.122zM2 4a1 1 0 0 0-1 1v7.82l.637 7A1 1 0 0 0 2.825 14H13.174a1 1 0 0 0 .995-1.18l-.637-7A1 1 0 0 0 12.534 4H2z"/>
        </svg>
        مسیر خروجی
      </button>
      <button id="previewSelectedBtn" class="btn btn-secondary d-flex align-items-center gap-1" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
          <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
          <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
        </svg>
        پیش‌نمایش انتخاب‌ها
      </button>
    </div>
  </div>

    <!-- Combined search, sort, and pagination controls -->
    <div class="d-flex flex-wrap align-items-center justify-content-between mb-3 gap-2">
      <div class="d-flex align-items-center gap-2 flex-grow-1">
        <button id="sortBtn" class="btn btn-outline-secondary btn-sm text-nowrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-down-up" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M11.5 15a.5.5 0 0 0 .5-.5V2.707l3.146 3.147a.5.5 0 0 0 .708-.708l-4-4a.5.5 0 0 0-.708 0l-4 4a.5.5 0 1 0 .708.708L11 2.707V14.5a.5.5 0 0 0 .5.5zm-7-14a.5.5 0 0 1 .5.5v11.793l3.146-3.147a.5.5 0 0 1 .708.708l-4 4a.5.5 0 0 1-.708 0l-4-4a.5.5 0 0 1 .708-.708L4 13.293V1.5a.5.5 0 0 1 .5-.5z"/>
          </svg>
          <span id="sortLabel">صعودی</span>
        </button>
        <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="جستجو در رکوردها..." style="max-width: 250px;">
      </div>
      <div class="d-flex align-items-center gap-2">
        <label class="form-label mb-0 text-nowrap">تعداد در صفحه:</label>
        <select id="pageSizeSelect" class="form-select form-select-sm" style="width: auto;">
          <option value="10">۱۰</option>
          <option value="50">۵۰</option>
          <option value="100">۱۰۰</option>
          <option value="0">همه</option>
        </select>
        <div class="btn-group btn-group-sm">
          <button id="prevPageBtn" class="btn btn-outline-secondary" disabled>قبلی</button>
          <span id="pageInfo" class="btn btn-outline-secondary disabled" style="cursor: default; opacity: 1;">صفحه ۱ از ۱</span>
          <button id="nextPageBtn" class="btn btn-outline-secondary" disabled>بعدی</button>
        </div>
      </div>
    </div>

    <!-- Form container -->
    <div id="formContainer" class="card p-3 mb-4"></div>

    <!-- Tickets table -->
    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle">
        <thead>
          <tr>
            <th><input type="checkbox" id="selectAll"></th>
            <th>ردیف</th>
            <th>نام و نام خانوادگی</th>
            <th>مبدأ (شهر)</th>
            <th>مقصد (شهر)</th>
            <th>تاریخ پرواز</th>
            <th>ساعت</th>
            <th>مبلغ بلیط (ریال)</th>
            <th>عملیات</th>
          </tr>
        </thead>
        <tbody id="ticketsTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Preview modal (unchanged) -->
  <div class="modal fade" id="previewModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">پیش‌نمایش</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="previewContent"></div>
        <div class="modal-footer d-flex justify-content-end gap-2">
          <button id="printPreviewBtn" class="btn btn-outline-primary px-4">چاپ</button>
          <button id="exportPreviewBtn" class="btn btn-outline-success px-4">خروجی تصویر</button>
          <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">بستن</button>
        </div>
      </div>
    </div>
  </div>

  <script src="jquery.min.js"></script>
  <script src="select2/dist/js/select2.min.js"></script>
  <script src="lib/jalalidatepicker.min.js"></script>
  <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../node_modules/html2canvas/dist/html2canvas.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
